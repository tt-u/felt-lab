name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 静态导出不包含服务端 API 路由(DeepSeek 调用走浏览器直连, 见 lib/llm.ts)
      - run: rm -rf app/api
      - run: npm run build
        env:
          STATIC_EXPORT: '1'
          NEXT_PUBLIC_BASE_PATH: /felt-lab
          NEXT_PUBLIC_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
