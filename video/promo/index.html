<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #07090b;
        font-family: "Helvetica Neue", "PingFang SC", sans-serif; color: #ecefee; }
      #root { position: relative; width: 1920px; height: 1080px;
        background:
          radial-gradient(1400px 700px at 50% -12%, rgba(61,220,151,0.10), transparent 62%),
          radial-gradient(1600px 900px at 50% 118%, rgba(18,50,39,0.85), transparent 70%),
          #07090b; }
      .vignette { position: absolute; inset: 0;
        background: radial-gradient(1200px 700px at 50% 52%, transparent 40%, rgba(0,0,0,0.55) 100%); }
      .scene { position: absolute; inset: 0; opacity: 0; }
      .mark { font-family: "SF Mono", Menlo, monospace; font-size: 24px; letter-spacing: 0.55em;
        color: #3ddc97; text-indent: 0.55em; text-align: center; }
      h1 { font-size: 110px; font-weight: 650; letter-spacing: -0.02em; text-align: center; }
      .sub { font-size: 30px; color: #8d979d; text-align: center; letter-spacing: 0.1em; }
      .card { position: absolute; width: 190px; height: 276px; border-radius: 16px;
        background: linear-gradient(168deg, #fdfcf8 0%, #f7f5ef 55%, #ebe8de 100%);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.9), 0 22px 56px rgba(0,0,0,0.6);
        color: #1d2226; transform-origin: 50% 120%; }
      .card .idx { position: absolute; top: 12px; left: 16px; font-weight: 700; font-size: 38px; line-height: 1; }
      .card .idx small { display: block; font-size: 34px; margin-top: 2px; }
      .card .pip { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 96px; }
      .card.red { color: #c93f34; }
      .chipx { position: absolute; width: 52px; height: 52px; border-radius: 50%;
        background: radial-gradient(circle at 50% 38%, #35e0a0 0%, #0d8a60 68%, #07543b 100%);
        border: 4px dashed rgba(255,255,255,0.55);
        box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), 0 10px 24px rgba(0,0,0,0.55); }
      .pill { display: inline-block; padding: 10px 26px; border-radius: 999px; font-size: 26px;
        border: 1.5px solid; margin: 0 10px; }
      .panel { position: absolute; left: 50%; top: 50%; width: 900px; margin-left: -450px;
        background: linear-gradient(165deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
        border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 44px 52px;
        box-shadow: 0 30px 90px rgba(0,0,0,0.55); }
      .row { font-size: 30px; line-height: 1.9; font-family: "SF Mono", Menlo, "PingFang SC", monospace; }
      .row .g { color: #3ddc97; } .row .m { color: #8d979d; }
      .h2 { font-size: 64px; font-weight: 650; text-align: center; letter-spacing: -0.01em; }
      .cta { display: inline-block; padding: 26px 90px; border-radius: 999px; font-size: 40px; font-weight: 650;
        color: #03150d; background: linear-gradient(180deg, #4ce8a6 0%, #3ddc97 45%, #21b57b 100%);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), 0 14px 50px rgba(61,220,151,0.35); }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="17" data-width="1920" data-height="1080">
      <div class="vignette clip" data-start="0" data-duration="17" data-track-index="1"></div>

      <!-- 场景1: 品牌 -->
      <div class="scene clip" data-start="0" data-duration="17" data-track-index="2" id="s1">
        <div style="position:absolute; left:0; right:0; top:380px;">
          <div class="mark" id="s1mark">FELT LAB</div>
          <h1 id="s1title" style="margin-top:26px;">翻牌屋</h1>
          <p class="sub" id="s1sub" style="margin-top:24px;">德州扑克对战训练 · 实时决策拆解 · 行为模式复盘</p>
        </div>
      </div>

      <!-- 场景2: 对手 -->
      <div class="scene clip" data-start="0" data-duration="17" data-track-index="3" id="s2">
        <div style="position:absolute; left:0; right:0; top:200px;">
          <div class="h2" id="s2title">和会算范围的对手过招</div>
        </div>
        <div id="s2cards" style="position:absolute; left:960px; top:560px; width:0; height:0;">
          <div class="card" id="c1" style="left:-300px; top:-140px;"><span class="idx">A<small>♠</small></span><span class="pip">♠</span></div>
          <div class="card red" id="c2" style="left:-95px; top:-160px;"><span class="idx">K<small>♥</small></span><span class="pip">♥</span></div>
          <div class="card" id="c3" style="left:110px; top:-140px;"><span class="idx">Q<small>♣</small></span><span class="pip">♣</span></div>
          <div class="chipx" id="ch1" style="left:330px; top:-40px;"></div>
          <div class="chipx" id="ch2" style="left:362px; top:-56px;"></div>
        </div>
        <div id="s2pills" style="position:absolute; left:0; right:0; top:880px; text-align:center;">
          <span class="pill" style="color:#7cc4f0; border-color:rgba(124,196,240,.5);">紧凶 TAG</span>
          <span class="pill" style="color:#f0a45c; border-color:rgba(240,164,92,.5);">松凶 LAG</span>
          <span class="pill" style="color:#c79bf0; border-color:rgba(199,155,240,.5);">跟注站</span>
          <span class="pill" style="color:#f07c7c; border-color:rgba(240,124,124,.5);">疯鱼 Maniac</span>
        </div>
      </div>

      <!-- 场景3: 实时拆解 -->
      <div class="scene clip" data-start="0" data-duration="17" data-track-index="4" id="s3">
        <div style="position:absolute; left:0; right:0; top:170px;">
          <div class="h2" id="s3title">每一手, 实时拆解</div>
        </div>
        <div class="panel" id="s3panel" style="margin-top:-160px;">
          <div class="row" id="r1"><span class="m">对手可能:</span> <span class="g">AA KK QQ JJ AKs AQs</span> <span class="m">(约9%起手牌)</span></div>
          <div class="row" id="r2"><span class="m">你的胜率</span> ~36% <span class="m">· 跟注需</span> 33%</div>
          <div class="row" id="r3"><span class="g">教练: 跟注</span> <span class="m">(胜率高于所需, 赔率够本)</span></div>
          <div class="row" id="r4"><span class="m">弃牌后开</span> <span class="g">兔子洞</span><span class="m">: 看看如果跟到底会怎样</span></div>
        </div>
      </div>

      <!-- 场景4: CTA -->
      <div class="scene clip" data-start="0" data-duration="17" data-track-index="5" id="s4">
        <div style="position:absolute; left:0; right:0; top:400px; text-align:center;">
          <div class="h2" id="s4title" style="margin-bottom:60px;">别只是打牌, 把每一手变成长进</div>
          <span class="cta" id="s4cta">开始训练</span>
          <p class="sub" id="s4url" style="margin-top:56px; font-family:'SF Mono',Menlo,monospace; letter-spacing:.2em;">tt-u.github.io/felt-lab</p>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // 场景1: 0-3.6s
      tl.set("#s1", { opacity: 1 }, 0);
      tl.fromTo("#s1mark", { opacity: 0, letterSpacing: "1.2em" }, { opacity: 1, letterSpacing: "0.55em", duration: 1.0, ease: "power2.out" }, 0.2);
      tl.fromTo("#s1title", { opacity: 0, y: 40 }, { opacity: 1, y: 0, duration: 0.8, ease: "power3.out" }, 0.6);
      tl.fromTo("#s1sub", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 1.0);
      tl.to("#s1", { opacity: 0, duration: 0.5 }, 3.1);

      // 场景2: 3.6-8.2s
      tl.fromTo("#s2", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 3.6);
      tl.fromTo("#s2title", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 3.8);
      ["#c1", "#c2", "#c3"].forEach((sel, i) => {
        tl.fromTo(sel, { y: 360, opacity: 0, rotation: (i - 1) * 18 }, { y: 0, opacity: 1, rotation: (i - 1) * 7, duration: 0.7, ease: "back.out(1.2)" }, 4.1 + i * 0.18);
      });
      tl.fromTo("#ch1", { x: 200, opacity: 0, rotation: 160 }, { x: 0, opacity: 1, rotation: 0, duration: 0.6, ease: "power3.out" }, 4.7);
      tl.fromTo("#ch2", { x: 240, opacity: 0, rotation: 220 }, { x: 0, opacity: 1, rotation: 0, duration: 0.6, ease: "power3.out" }, 4.85);
      tl.fromTo("#s2pills", { opacity: 0, y: 24 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 5.2);
      tl.to("#s2", { opacity: 0, duration: 0.5 }, 7.7);

      // 场景3: 8.2-13s
      tl.fromTo("#s3", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 8.2);
      tl.fromTo("#s3title", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 8.4);
      tl.fromTo("#s3panel", { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 8.7);
      ["#r1", "#r2", "#r3", "#r4"].forEach((sel, i) => {
        tl.fromTo(sel, { opacity: 0, x: -24 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" }, 9.2 + i * 0.55);
      });
      tl.to("#s3", { opacity: 0, duration: 0.5 }, 12.5);

      // 场景4: 13-17s
      tl.fromTo("#s4", { opacity: 0 }, { opacity: 1, duration: 0.5 }, 13.0);
      tl.fromTo("#s4title", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 13.2);
      tl.fromTo("#s4cta", { scale: 0.7, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.7, ease: "back.out(1.5)" }, 13.7);
      tl.fromTo("#s4url", { opacity: 0 }, { opacity: 1, duration: 0.6 }, 14.3);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
