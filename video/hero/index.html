<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #07090b;
        font-family: "Helvetica Neue", "PingFang SC", sans-serif;
      }
      #root { position: relative; width: 1920px; height: 1080px;
        background:
          radial-gradient(1400px 700px at 50% -12%, rgba(61,220,151,0.10), transparent 62%),
          radial-gradient(1600px 900px at 50% 118%, rgba(18,50,39,0.85), transparent 70%),
          #07090b;
      }
      .vignette { position: absolute; inset: 0;
        background: radial-gradient(1200px 700px at 50% 52%, transparent 40%, rgba(0,0,0,0.55) 100%);
      }
      .felt-arc { position: absolute; left: -10%; right: -10%; bottom: -46%; height: 70%;
        border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        background: radial-gradient(ellipse at 50% 0%, #1c4d3a 0%, #123227 55%, #0a1f18 100%);
        box-shadow: inset 0 6px 40px rgba(0,0,0,0.6), 0 -2px 0 rgba(255,255,255,0.06);
      }
      /* 像素锚点: 不用 transform 居中(运行时会接管 clip 元素的 transform) */
      /* 牌扇偏右, 给页面左侧文案留出净空 */
      .stage { position: absolute; left: 1270px; top: 540px; width: 0; height: 0; }
      .card { position: absolute; left: -110px; top: -160px; width: 220px; height: 320px;
        border-radius: 18px;
        background: linear-gradient(168deg, #fdfcf8 0%, #f7f5ef 55%, #ebe8de 100%);
        box-shadow: inset 0 2px 0 rgba(255,255,255,0.9), 0 24px 60px rgba(0,0,0,0.6);
        color: #1d2226; transform-origin: 50% 120%;
      }
      .card .idx { position: absolute; top: 14px; left: 18px; font-weight: 700; font-size: 44px; line-height: 1; }
      .card .idx small { display: block; font-size: 40px; margin-top: 2px; }
      .card .pip { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 110px; }
      .sweep { position: absolute; left: -460px; top: -420px; width: 240px; height: 840px;
        background: linear-gradient(100deg, transparent 0%, rgba(255,255,255,0.14) 50%, transparent 100%);
        transform: rotate(14deg); pointer-events: none;
      }
      .brand { position: absolute; left: 0; right: 0; top: 72%; text-align: center; }
      .brand .mark { font-family: "SF Mono", Menlo, monospace; font-size: 26px; letter-spacing: 0.55em;
        color: #3ddc97; text-indent: 0.55em; }
      .brand h1 { margin-top: 18px; font-size: 92px; font-weight: 650; letter-spacing: -0.02em; color: #ecefee; }
      .brand p { margin-top: 16px; font-size: 26px; color: #8d979d; letter-spacing: 0.12em; }
      .chipx { position: absolute; width: 56px; height: 56px; border-radius: 50%;
        background: radial-gradient(circle at 50% 38%, #35e0a0 0%, #0d8a60 68%, #07543b 100%);
        border: 4px dashed rgba(255,255,255,0.55);
        box-shadow: inset 0 2px 2px rgba(255,255,255,0.4), inset 0 -2px 4px rgba(0,0,0,0.45), 0 10px 24px rgba(0,0,0,0.55);
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="8" data-width="1920" data-height="1080">
      <div class="felt-arc clip" data-start="0" data-duration="8" data-track-index="1" id="arc"></div>
      <div class="vignette clip" data-start="0" data-duration="8" data-track-index="2"></div>

      <div class="stage clip" data-start="0" data-duration="8" data-track-index="3">
        <!-- GSAP 动画作用在内层, 避免覆盖外层的居中 transform -->
        <div id="stageInner" style="position:absolute; left:0; top:0; width:0; height:0;">
          <div class="card c" id="c1"><span class="idx">10<small>♠</small></span><span class="pip">♠</span></div>
          <div class="card c" id="c2"><span class="idx">J<small>♠</small></span><span class="pip">♠</span></div>
          <div class="card c" id="c3"><span class="idx">Q<small>♠</small></span><span class="pip">♠</span></div>
          <div class="card c" id="c4"><span class="idx">K<small>♠</small></span><span class="pip">♠</span></div>
          <div class="card c" id="c5"><span class="idx">A<small>♠</small></span><span class="pip">♠</span></div>
          <div class="sweep" id="sweep"></div>
          <div class="chipx" id="chip1" style="left: 360px; top: 40px;"></div>
          <div class="chipx" id="chip2" style="left: 392px; top: 28px;"></div>
          <div class="chipx" id="chip3" style="left: -470px; top: 60px;"></div>
        </div>
      </div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const fan = [-26, -13, 0, 13, 26];
      const cards = ["#c1", "#c2", "#c3", "#c4", "#c5"];

      cards.forEach((sel, i) => {
        tl.fromTo(sel,
          { y: 520, rotation: fan[i] * 2.2, opacity: 0 },
          { y: 0, rotation: fan[i], opacity: 1, duration: 0.9, ease: "back.out(1.25)" },
          0.35 + i * 0.22);
      });
      tl.fromTo("#chip3", { x: -260, opacity: 0, rotation: -160 }, { x: 0, opacity: 1, rotation: 0, duration: 0.8, ease: "power3.out" }, 1.5);
      tl.fromTo("#chip1", { x: 240, opacity: 0, rotation: 140 }, { x: 0, opacity: 1, rotation: 0, duration: 0.8, ease: "power3.out" }, 1.62);
      tl.fromTo("#chip2", { x: 280, opacity: 0, rotation: 200 }, { x: 0, opacity: 1, rotation: 0, duration: 0.8, ease: "power3.out" }, 1.74);

      // 光扫过牌面
      tl.fromTo("#sweep", { x: 0, opacity: 0 }, { opacity: 1, duration: 0.2 }, 3.4);
      tl.to("#sweep", { x: 980, duration: 1.4, ease: "power2.inOut" }, 3.5);
      tl.to("#sweep", { opacity: 0, duration: 0.25 }, 4.75);

      // 收尾: 整体轻微沉降到定格
      tl.to("#stageInner", { y: -6, duration: 2.5, ease: "sine.out" }, 5.2);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
